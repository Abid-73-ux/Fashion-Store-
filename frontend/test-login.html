<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Debug Test</title>
</head>
<body>
    <h1>Login Debug Test</h1>
    <div id="output" style="border: 1px solid #ccc; padding: 20px; margin: 20px 0; min-height: 300px; font-family: monospace; white-space: pre-wrap; background: #f5f5f5;"></div>
    
    <script src="assets/js/config.js"></script>
    <script>
        const output = document.getElementById('output');
        
        function log(msg) {
            output.innerHTML += msg + '\n';
            console.log(msg);
        }
        
        log('🔍 === LOGIN DEBUG TEST ===\n');
        
        log('📍 API Base URL: ' + API_CONFIG.getBaseUrl());
        log('📍 Hostname: ' + window.location.hostname);
        log('📍 Is Development: ' + API_CONFIG.isDevelopment);
        
        // Test register first
        async function testRegister() {
            log('\n⏳ Testing register endpoint...');
            
            try {
                const response = await fetch(API_CONFIG.getEndpoint('/auth/register'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: 'Debug User ' + Date.now(),
                        email: 'debug' + Date.now() + '@test.com',
                        password: 'Test123!@#'
                    })
                });
                
                log('✅ Register Response Status: ' + response.status);
                const data = await response.json();
                log('✅ Register Response: ' + JSON.stringify(data, null, 2));
                
                return data;
                
            } catch (error) {
                log('❌ Register Error: ' + error.message);
                return null;
            }
        }
        
        // Test login
        async function testLogin(email, password) {
            log('\n⏳ Testing login endpoint with email: ' + email);
            
            try {
                const response = await fetch(API_CONFIG.getEndpoint('/auth/login'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });
                
                log('✅ Login Response Status: ' + response.status);
                const data = await response.json();
                log('✅ Login Response: ' + JSON.stringify(data, null, 2));
                
                return data;
                
            } catch (error) {
                log('❌ Login Error: ' + error.message);
                return null;
            }
        }
        
        // Test health check
        async function testHealth() {
            log('\n⏳ Testing health endpoint...');
            
            try {
                const response = await fetch(API_CONFIG.getEndpoint('/health'));
                log('✅ Health Response Status: ' + response.status);
                const data = await response.json();
                log('✅ Health Response: ' + JSON.stringify(data, null, 2));
            } catch (error) {
                log('❌ Health Error: ' + error.message);
            }
        }
        
        // Run tests
        async function runTests() {
            await testHealth();
            const registerResult = await testRegister();
            
            if (registerResult && registerResult.user && registerResult.user.email) {
                await testLogin(registerResult.user.email, 'Test123!@#');
            }
        }
        
        // Start tests after a delay
        setTimeout(runTests, 500);
    </script>
</body>
</html>
