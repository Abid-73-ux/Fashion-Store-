<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Takanj</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@300;400;500;600;700&family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary-color: #0a0a0a;
            --secondary-color: #c9a961;
            --white: #ffffff;
            --cream: #f5f5f0;
            --off-white: #fafaf9;
            --gray-300: #d4d4cf;
            --gray-500: #7a7a6e;
            --gray-600: #5a5a51;
            --gray-800: #2a2a25;
            --font-primary: 'Montserrat', sans-serif;
            --font-secondary: 'Cormorant Garamond', serif;
            --font-accent: 'Cinzel', serif;
        }
        
        body {
            font-family: var(--font-primary);
            margin: 0;
            padding: 0;
        }
        
        .auth-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, var(--cream) 0%, var(--off-white) 100%);
            padding: 3rem 0;
        }
        
        .auth-card {
            background: var(--white);
            padding: 3rem 2.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
        }
        
        .brand {
            font-family: var(--font-accent);
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
            text-align: center;
        }
        
        .brand span {
            color: var(--secondary-color);
        }
        
        h1 {
            font-family: var(--font-secondary);
            font-size: 2rem;
            font-weight: 300;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            text-align: center;
        }
        
        .form-control {
            border: 2px solid var(--gray-300);
            padding: 1rem;
            font-size: 1rem;
        }
        
        .form-control:focus {
            border-color: var(--secondary-color);
            box-shadow: none;
        }
        
        .btn-register {
            background: var(--primary-color);
            color: var(--white);
            border: 2px solid var(--primary-color);
            padding: 1rem;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-register:hover {
            background: transparent;
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    
    <section class="auth-section">
        <div class="container">
            <div class="auth-card">
                <div class="brand">TAKANJ<span></span></div>
                <h1>Create Account</h1>
                <p class="text-center text-muted mb-4">Join us today</p>
                
                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="confirmPassword" required>
                    </div>
                    
                    <button type="submit" class="btn btn-register">Register</button>
                </form>
                
                <p class="text-center mt-4">
                    Already have an account? 
                    <a href="login.html" style="color: var(--secondary-color); font-weight: 600; text-decoration: none;">Login</a>
                </p>
                
                <p class="text-center mt-3">
                    <a href="index.html" style="color: var(--gray-600); text-decoration: none;">
                        <i class="bi bi-arrow-left"></i> Back to Home
                    </a>
                </p>
            </div>
        </div>
    </section>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="assets/js/config.js"></script>
    <script src="assets/js/toast.js"></script>

    <script>
        console.log('📝 Register page loaded');
        
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validate password match
            if (password !== confirmPassword) {
                Toast.error('Passwords do not match');
                return;
            }
            
            // Validate password strength
            if (password.length < 6) {
                Toast.error('Password must be at least 6 characters');
                return;
            }
            
            console.log('🔐 Attempting registration with:', email);
            
            try {
                // Call backend API to register
                const response = await fetch(API_CONFIG.getEndpoint('/auth/register'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: name,
                        email: email,
                        password: password
                    })
                });
                
                console.log('📊 Register response status:', response.status);
                
                if (!response.ok) {
                    const errorData = await response.json();
                    console.error('❌ Registration failed:', errorData);
                    throw new Error(errorData.error || 'Registration failed');
                }
                
                const data = await response.json();
                console.log('✅ Registration successful:', data);
                
                // Save token and user to localStorage
                const token = data.token;
                const user = data.user;
                
                if (!token) {
                    throw new Error('No token received from server');
                }
                
                console.log('💾 Saving to localStorage:', { token, user });
                
                localStorage.setItem('token', token);
                localStorage.setItem('user', JSON.stringify(user));
                
                if (user?.id) {
                    localStorage.setItem('userId', user.id);
                }
                
                Toast.success('Account created successfully! Redirecting...');
                
                setTimeout(() => {
                    console.log('🔄 Redirecting to profile');
                    window.location.href = 'profile.html';
                }, 1500);
                
            } catch (error) {
                console.error('❌ Registration error:', error);
                Toast.error(error.message || 'Registration failed. Please try again.');
            }
        });
    </script>
    

    <!-- WhatsApp Widget -->
    <script src="assets/js/whatsapp-widget.js"></script>

    <!-- Email Contact Widget -->
    <script src="assets/js/email-contact.js"></script>

</body>
</html>
