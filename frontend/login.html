<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Takanj</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@300;400;500;600;700&family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Custom CSS for Inputs -->
    <link rel="stylesheet" href="assets/css/inputs.css">
    
    <style>
        :root {
            --primary-color: #0a0a0a;
            --secondary-color: #c9a961;
            --white: #ffffff;
            --cream: #f5f5f0;
            --off-white: #fafaf9;
            --gray-300: #d4d4cf;
            --gray-500: #7a7a6e;
            --gray-600: #5a5a51;
            --gray-800: #2a2a25;
            --font-primary: 'Montserrat', sans-serif;
            --font-secondary: 'Cormorant Garamond', serif;
            --font-accent: 'Cinzel', serif;
        }
        
        body {
            font-family: var(--font-primary);
            margin: 0;
            padding: 0;
        }
        
        .auth-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, var(--cream) 0%, var(--off-white) 100%);
            padding: 3rem 0;
        }
        
        .auth-card {
            background: var(--white);
            padding: 3rem 2.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
        }
        
        .brand {
            font-family: var(--font-accent);
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
            text-align: center;
        }
        
        .brand span {
            color: var(--secondary-color);
        }
        
        h1 {
            font-family: var(--font-secondary);
            font-size: 2.5rem;
            font-weight: 300;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            text-align: center;
        }
        
        .form-control {
            border: 2px solid var(--gray-300);
            padding: 1rem;
            font-size: 1rem;
        }
        
        .form-control:focus {
            border-color: var(--secondary-color);
            box-shadow: none;
        }
        
        .btn-login {
            background: var(--primary-color);
            color: var(--white);
            border: 2px solid var(--primary-color);
            padding: 1rem;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-login:hover {
            background: transparent;
            color: var(--primary-color);
        }
        
        .btn-social {
            width: 100%;
            padding: 0.9rem;
            border: 2px solid var(--gray-300);
            background: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .btn-social:hover {
            border-color: var(--secondary-color);
            background: var(--cream);
        }
        
        .divider {
            text-align: center;
            margin: 2rem 0;
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: var(--gray-300);
        }
        
        .divider span {
            background: var(--white);
            padding: 0 1rem;
            position: relative;
            color: var(--gray-600);
            font-size: 0.875rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    
    <section class="auth-section">
        <div class="container">
            <div class="auth-card">
                <div class="brand">TAKANJ<span></span></div>
                <h1>Welcome Back</h1>
                <p class="text-center text-muted mb-4">Login to your account</p>
                
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>
                    
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="remember">
                            <label class="form-check-label" for="remember">Remember Me</label>
                        </div>
                        <a href="forgot-password.html" style="color: var(--secondary-color); text-decoration: none;">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-login">Login</button>
                </form>
                
                <div class="divider"><span>Or continue with</span></div>
                
                <button class="btn-social" onclick="alert('Google Sign-In will be implemented with backend')">
                    <i class="bi bi-google" style="color: #ea4335;"></i>
                    <span>Continue with Google</span>
                </button>
                
                <button class="btn-social" onclick="alert('Facebook Login will be implemented with backend')">
                    <i class="bi bi-facebook" style="color: #1877f2;"></i>
                    <span>Continue with Facebook</span>
                </button>
                
                <p class="text-center mt-4">
                    Don't have an account? 
                    <a href="register.html" style="color: var(--secondary-color); font-weight: 600; text-decoration: none;">Register Now</a>
                </p>
                
                <p class="text-center mt-3">
                    <a href="index.html" style="color: var(--gray-600); text-decoration: none;">
                        <i class="bi bi-arrow-left"></i> Back to Home
                    </a>
                </p>
            </div>
        </div>
    </section>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Simulate login
            const user = {
                email: email,
                name: email.split('@')[0],
                role: 'customer'
            };
            
            localStorage.setItem('currentUser', JSON.stringify(user));
            
            alert('Login successful! Redirecting...');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        });
    </script>
    

    <!-- WhatsApp Widget -->
    <script src="assets/js/whatsapp-widget.js"></script>


    <!-- Email Contact Widget -->
    <script src="assets/js/email-contact.js"></script>

</body>
</html>
