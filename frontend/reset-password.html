<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Takanj</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@300;400;500;600;700&family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <style>
        .auth-section { min-height: 100vh; display: flex; align-items: center; background: linear-gradient(135deg, var(--cream) 0%, var(--off-white) 100%); padding: var(--spacing-3xl) 0; }
        .auth-card { background: var(--white); padding: var(--spacing-4xl) var(--spacing-3xl); box-shadow: 0 10px 40px rgba(0,0,0,0.1); max-width: 480px; margin: 0 auto; }
        .auth-header { text-align: center; margin-bottom: var(--spacing-3xl); }
        .auth-header .brand { font-family: var(--font-accent); font-size: var(--font-size-3xl); font-weight: var(--font-weight-bold); color: var(--primary-color); margin-bottom: var(--spacing-md); letter-spacing: 0.1em; }
        .auth-header h1 { font-family: var(--font-secondary); font-size: var(--font-size-4xl); font-weight: var(--font-weight-light); color: var(--primary-color); margin-bottom: var(--spacing-sm); }
        .form-floating > label { font-size: var(--font-size-xs); text-transform: uppercase; letter-spacing: var(--letter-spacing-wide); font-weight: var(--font-weight-medium); color: var(--gray-600); }
        .form-control { border: 2px solid var(--gray-300); padding: 1.2rem 1rem; font-size: var(--font-size-base); transition: all var(--transition-fast); }
        .form-control:focus { border-color: var(--secondary-color); box-shadow: none; }
        .password-toggle { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--gray-500); cursor: pointer; z-index: 10; }
        .password-toggle:hover { color: var(--primary-color); }
        .password-strength { height: 4px; background: var(--gray-200); margin-top: 0.5rem; overflow: hidden; }
        .password-strength-bar { height: 100%; width: 0; transition: all 0.3s; }
        .strength-weak { width: 33%; background: #dc3545; }
        .strength-medium { width: 66%; background: #ffc107; }
        .strength-strong { width: 100%; background: #28a745; }
        .btn-submit { background: var(--primary-color); color: var(--white); border: 2px solid var(--primary-color); padding: 1rem; width: 100%; text-transform: uppercase; letter-spacing: var(--letter-spacing-wider); font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold); transition: all var(--transition-base); }
        .btn-submit:hover { background: transparent; color: var(--primary-color); }
    </style>
</head>
<body>
    <section class="auth-section">
        <div class="container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="mb-4"><i class="bi bi-shield-lock" style="font-size: 4rem; color: var(--secondary-color);"></i></div>
                    <div class="brand">TAKANJ<span style="color: var(--secondary-color);"></span></div>
                    <h1>Reset Password</h1>
                    <p class="text-muted">Create a new password for your account</p>
                </div>
                <form id="resetForm">
                    <div class="form-floating mb-3 position-relative">
                        <input type="password" class="form-control" id="newPassword" name="password" placeholder="New Password" required>
                        <label for="newPassword">New Password</label>
                        <button type="button" class="password-toggle" id="togglePassword">
                            <i class="bi bi-eye"></i>
                        </button>
                        <div class="invalid-feedback"></div>
                    </div>
                    <div class="password-strength">
                        <div class="password-strength-bar" id="strengthBar"></div>
                    </div>
                    <small class="text-muted d-block mb-3" id="strengthText"></small>
                    
                    <div class="form-floating mb-4 position-relative">
                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required>
                        <label for="confirmPassword">Confirm Password</label>
                        <button type="button" class="password-toggle" id="toggleConfirmPassword">
                            <i class="bi bi-eye"></i>
                        </button>
                        <div class="invalid-feedback"></div>
                    </div>
                    
                    <button type="submit" class="btn btn-submit">Reset Password</button>
                </form>
                <div class="text-center mt-4">
                    <a href="login.html" class="text-decoration-none" style="font-size: var(--font-size-sm); color: var(--secondary-color); font-weight: var(--font-weight-semibold);"><i class="bi bi-arrow-left me-1"></i> Back to Login</a>
                </div>
            </div>
        </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/toast.js"></script>
    <script src="assets/js/validation.js"></script>
    <script>
        // Password toggles
        document.getElementById('togglePassword').addEventListener('click', function() {
            const password = document.getElementById('newPassword');
            const icon = this.querySelector('i');
            if (password.type === 'password') {
                password.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                password.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        });
        
        document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
            const password = document.getElementById('confirmPassword');
            const icon = this.querySelector('i');
            if (password.type === 'password') {
                password.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                password.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        });
        
        // Password strength
        document.getElementById('newPassword').addEventListener('input', function() {
            const password = this.value;
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
            if (password.match(/\d/)) strength++;
            if (password.match(/[@$!%*?&]/)) strength++;
            strengthBar.className = 'password-strength-bar';
            if (strength <= 1) {
                strengthBar.classList.add('strength-weak');
                strengthText.textContent = 'Weak password';
                strengthText.style.color = '#dc3545';
            } else if (strength <= 3) {
                strengthBar.classList.add('strength-medium');
                strengthText.textContent = 'Medium strength';
                strengthText.style.color = '#ffc107';
            } else {
                strengthBar.classList.add('strength-strong');
                strengthText.textContent = 'Strong password';
                strengthText.style.color = '#28a745';
            }
        });
        
        const form = document.getElementById('resetForm');
        Validation.initForm(form);
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (Validation.validateForm(form)) {
                Toast.success('Password reset successful! Redirecting to login...');
                setTimeout(() => window.location.href = 'login.html', 2000);
            }
        });
    </script>

    <!-- WhatsApp Widget -->
    <script src="assets/js/whatsapp-widget.js"></script>


    <!-- Email Contact Widget -->
    <script src="assets/js/email-contact.js"></script>

</body>
</html>
