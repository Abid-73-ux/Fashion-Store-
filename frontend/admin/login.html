<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Takanj</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@300;400;500;600;700&family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/inputs.css">
    <style>
        .admin-login-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            padding: var(--spacing-3xl) 0;
        }
        .admin-card {
            background: #1a1a1a;
            padding: var(--spacing-4xl) var(--spacing-3xl);
            box-shadow: 0 20px 60px rgba(201, 169, 97, 0.2);
            max-width: 450px;
            margin: 0 auto;
            border: 1px solid rgba(201, 169, 97, 0.2);
        }
        .admin-header {
            text-align: center;
            margin-bottom: var(--spacing-3xl);
        }
        .admin-header .brand {
            font-family: var(--font-accent);
            font-size: var(--font-size-3xl);
            font-weight: var(--font-weight-bold);
            color: var(--secondary-color);
            margin-bottom: var(--spacing-md);
            letter-spacing: 0.1em;
        }
        .admin-header h1 {
            font-family: var(--font-secondary);
            font-size: var(--font-size-4xl);
            font-weight: var(--font-weight-light);
            color: var(--white);
            margin-bottom: var(--spacing-sm);
        }
        .admin-badge {
            background: var(--secondary-color);
            color: var(--primary-color);
            padding: 0.5rem 1.5rem;
            font-size: var(--font-size-xs);
            text-transform: uppercase;
            letter-spacing: var(--letter-spacing-wider);
            font-weight: var(--font-weight-bold);
            display: inline-block;
            margin-bottom: var(--spacing-lg);
        }
        .form-floating > label {
            font-size: var(--font-size-xs);
            text-transform: uppercase;
            letter-spacing: var(--letter-spacing-wide);
            font-weight: var(--font-weight-medium);
            color: var(--gray-500);
        }
        .form-control {
            background: #0a0a0a;
            border: 2px solid rgba(201, 169, 97, 0.3);
            color: var(--white);
            padding: 1.2rem 1rem;
            font-size: var(--font-size-base);
        }
        .form-control:focus {
            background: #0a0a0a;
            border-color: var(--secondary-color);
            color: var(--white);
            box-shadow: 0 0 0 0.2rem rgba(201, 169, 97, 0.1);
        }
        .form-control::placeholder { color: var(--gray-600); }
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--gray-500);
            cursor: pointer;
            z-index: 10;
        }
        .password-toggle:hover { color: var(--secondary-color); }
        .btn-admin-login {
            background: var(--secondary-color);
            color: var(--primary-color);
            border: 2px solid var(--secondary-color);
            padding: 1rem;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: var(--letter-spacing-wider);
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-bold);
            transition: all var(--transition-base);
        }
        .btn-admin-login:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .form-check-input:checked {
            background-color: var(--secondary-color);
            border-color: var(--secondary-color);
        }
    </style>
</head>
<body>
    <section class="admin-login-section">
        <div class="container">
            <div class="admin-card">
                <div class="admin-header">
                    <div class="mb-4"><i class="bi bi-shield-lock-fill" style="font-size: 4rem; color: var(--secondary-color);"></i></div>
                    <div class="brand">ADMIN PANEL</div>
                    <span class="admin-badge">Restricted Access</span>
                    <h1>Administrator Login</h1>
                    <p class="text-muted">Secure access to dashboard</p>
                </div>
                
                <form id="adminLoginForm">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="username" name="username" placeholder="Username" required>
                        <label for="username">Username</label>
                        <div class="invalid-feedback"></div>
                    </div>
                    
                    <div class="form-floating mb-3 position-relative">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                        <label for="password">Password</label>
                        <button type="button" class="password-toggle" id="togglePassword">
                            <i class="bi bi-eye"></i>
                        </button>
                        <div class="invalid-feedback"></div>
                    </div>
                    
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label text-muted" for="rememberMe" style="font-size: var(--font-size-sm);">
                                Remember Me
                            </label>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-admin-login">
                        <i class="bi bi-shield-check me-2"></i>Secure Login
                    </button>
                </form>
                
                <div class="text-center mt-4">
                    <a href="../index.html" class="text-decoration-none" style="font-size: var(--font-size-sm); color: var(--gray-500);">
                        <i class="bi bi-arrow-left me-1"></i> Back to Store
                    </a>
                </div>
            </div>
        </div>
    </section>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/toast.js"></script>
    <script src="../assets/js/modal.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/validation.js"></script>
    <script>
        console.log('Admin login page loaded');
        
        // Wait for DOM
        window.addEventListener('load', function() {
            console.log('Page fully loaded');
            
            const form = document.getElementById('adminLoginForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            
            if (!form) {
                console.error('Form not found!');
                return;
            }
            
            console.log('Form found, attaching submit handler');
            
            form.addEventListener('submit', function(e) {
                console.log('Form submit event fired');
                e.preventDefault();
                
                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();
                
                console.log('Username:', username);
                console.log('Password length:', password.length);
                
                // Simple validation
                if (!username || !password) {
                    console.log('Empty fields');
                    if (typeof Toast !== 'undefined') {
                        Toast.error('Username and password required');
                    }
                    return;
                }
                
                // Check credentials
                if (username === 'admin' && password === 'admin123') {
                    console.log('Credentials correct!');
                    
                    // Store admin user
                    try {
                        const adminUser = {
                            id: 'admin-001',
                            email: 'admin@admin.local',
                            name: 'Administrator',
                            role: 'admin',
                            loginTime: new Date().toISOString()
                        };
                        localStorage.setItem('currentUser', JSON.stringify(adminUser));
                        console.log('User data stored:', localStorage.getItem('currentUser'));
                    } catch(err) {
                        console.error('localStorage error:', err);
                    }
                    
                    if (typeof Toast !== 'undefined') {
                        Toast.success('Login successful!');
                    }
                    
                    console.log('Redirecting to dashboard...');
                    // Redirect after 1 second
                    setTimeout(function() {
                        console.log('Now redirecting...');
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    console.log('Invalid credentials');
                    if (typeof Toast !== 'undefined') {
                        Toast.error('Invalid credentials. Use: admin / admin123');
                    }
                }
            });
            
            // Password toggle
            const toggleBtn = document.getElementById('togglePassword');
            if (toggleBtn) {
                toggleBtn.addEventListener('click', function() {
                    if (passwordInput.type === 'password') {
                        passwordInput.type = 'text';
                    } else {
                        passwordInput.type = 'password';
                    }
                });
            }
        });
    </script>
</body>
</html>
