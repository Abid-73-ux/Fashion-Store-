<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews - Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@300;400;500;600;700&family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="admin-body">
    <div class="admin-wrapper">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">FASHION<span style="color: var(--white);">STORE</span></div>
                <small class="sidebar-subtitle">Admin Panel</small>
            </div>
            <nav class="sidebar-menu">
                <div class="menu-section-title">Main</div>
                <a href="dashboard.html" class="menu-item"><i class="bi bi-speedometer2"></i><span>Dashboard</span></a>
                <div class="menu-section-title">E-Commerce</div>
                <a href="products.html" class="menu-item"><i class="bi bi-box-seam"></i><span>Products</span></a>
                <a href="categories.html" class="menu-item"><i class="bi bi-grid"></i><span>Categories</span></a>
                <a href="orders.html" class="menu-item"><i class="bi bi-cart-check"></i><span>Orders</span></a>
                <a href="customers.html" class="menu-item"><i class="bi bi-people"></i><span>Customers</span></a>
                <a href="reviews.html" class="menu-item active"><i class="bi bi-star"></i><span>Reviews</span></a>
                <div class="menu-section-title">Management</div>
                <a href="inventory.html" class="menu-item"><i class="bi bi-boxes"></i><span>Inventory</span></a>
                <a href="coupons.html" class="menu-item"><i class="bi bi-ticket-perforated"></i><span>Coupons</span></a>
                <a href="analytics.html" class="menu-item"><i class="bi bi-bar-chart"></i><span>Analytics</span></a>
                <div class="menu-section-title">System</div>
                <a href="settings.html" class="menu-item"><i class="bi bi-gear"></i><span>Settings</span></a>
                <a href="#" class="menu-item" id="adminLogout"><i class="bi bi-box-arrow-right"></i><span>Logout</span></a>
            </nav>
        </aside>
        <main class="admin-main">
            <header class="admin-topbar">
                <div class="topbar-search position-relative">
                    <i class="bi bi-search position-absolute" style="left: 1rem; top: 50%; transform: translateY(-50%); color: var(--gray-500);"></i>
                    <input type="text" class="form-control" placeholder="Search...">
                </div>
                <div class="topbar-actions">
                    <div class="topbar-icon"><i class="bi bi-bell"></i><span class="notification-badge">5</span></div>
                    <div class="topbar-icon"><i class="bi bi-envelope"></i><span class="notification-badge">3</span></div>
                    <div class="dropdown">
                        <button class="btn btn-link p-0 dropdown-toggle d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown">
                            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=100" alt="Admin" style="width: 35px; height: 35px; border-radius: 50%; object-fit: cover;">
                            <span style="font-size: 0.9rem; color: var(--gray-800);">Admin</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end border-0 shadow-sm">
                            <li><a class="dropdown-item" href="settings.html"><i class="bi bi-gear me-2"></i>Settings</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" id="topbarLogout"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                        </ul>
                    </div>
                </div>
            </header>
            <div class="admin-content">
                <div class="page-header">
                    <h1 class="page-title">Review Management</h1>
                    <p class="page-subtitle">Manage customer reviews and ratings</p>
                </div>
                <div class="card">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead>
                                    <tr>
                                        <th>Customer</th>
                                        <th>Product</th>
                                        <th>Rating</th>
                                        <th>Review</th>
                                        <th>Date</th>
                                        <th style="width: 100px;">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Reviews will be rendered here by JavaScript -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/toast.js"></script>
    <script src="../assets/js/modal.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/admin-storage.js"></script>
    <script src="../assets/js/admin-reviews.js"></script>
    <script>
        if (!Auth.isAdmin()) { Toast.error('Access denied'); setTimeout(() => { window.location.href = '../login.html'; }, 2000); }
        
        // Initialize reviews module
        document.addEventListener('DOMContentLoaded', () => {
            AdminReviews.init();
        });
        
        document.getElementById('adminLogout')?.addEventListener('click', (e) => { e.preventDefault(); Modal.showLogoutConfirm(() => { Auth.logout(); setTimeout(() => { window.location.href = '../login.html'; }, 1000); }); });
        document.getElementById('topbarLogout')?.addEventListener('click', (e) => { e.preventDefault(); Modal.showLogoutConfirm(() => { Auth.logout(); setTimeout(() => { window.location.href = '../login.html'; }, 1000); }); });
    </script>
</body>
</html>
